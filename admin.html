<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio Admin</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="admin-container">
        <div class="top-actions">
            <a href="/">← Back to Portfolio</a>
            <a href="javascript:window.location.reload()">Refresh</a>
        </div>

        <h1>Admin Dashboard</h1>

        <div class="stats-grid">
            <div class="stat-card">
                <h3>Total Visitors</h3>
                <p id="visitorStat">Loading...</p>
            </div>
            <div class="stat-card">
                <h3>Total Messages</h3>
                <p id="messageStat">Loading...</p>
            </div>
        </div>

        <h2>Contact Messages</h2>
        <div id="messagesList" class="messages-list">
            <p>Loading messages...</p>
        </div>
    </div>

    <script>
        async function loadStats() {
            try {
                const response = await fetch('/api/stats');
                const data = await response.json();
                document.getElementById('visitorStat').textContent = data.visitors ?? 0;
                document.getElementById('messageStat').textContent = data.messages ?? 0;
            } catch (error) {
                document.getElementById('visitorStat').textContent = 'Error';
                document.getElementById('messageStat').textContent = 'Error';
            }
        }

        async function loadMessages() {
            const container = document.getElementById('messagesList');
            try {
                const response = await fetch('/api/messages');
                const data = await response.json();
                const messages = data.messages || [];

                if (!messages.length) {
                    container.innerHTML = '<p>No messages yet.</p>';
                    return;
                }

                container.innerHTML = messages.map(message => `
                    <div class="message-card">
                        <h3>${message.name}</h3>
                        <p><strong>Email:</strong> ${message.email}</p>
                        <p><strong>Date:</strong> ${message.created_at}</p>
                        <p>${message.message}</p>
                        <button onclick="deleteMessage(${message.id})">Delete</button>
                    </div>
                `).join('');
            } catch (error) {
                container.innerHTML = '<p>Unable to load messages.</p>';
            }
        }

        async function deleteMessage(id) {
            if (!confirm('Delete this message?')) return;

            try {
                const response = await fetch(`/api/messages/${id}`, {
                    method: 'DELETE'
                });
                const data = await response.json();

                if (response.ok) {
                    alert(data.message || 'Message deleted');
                    loadStats();
                    loadMessages();
                } else {
                    alert(data.error || 'Could not delete message');
                }
            } catch (error) {
                alert('Network error. Please try again.');
            }
        }

        loadStats();
        loadMessages();
    </script>
</body>
</html>
