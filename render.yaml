services:
  - type: web
    name: fariya-portfolio
    runtime: python
    region: oregon
    plan: free
    branch: main
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn --bind 0.0.0.0:$PORT --workers 2 --timeout 120 server:app
    autoDeployTrigger: commit
    healthCheckPath: /health
    envVars:
      - key: FLASK_ENV
        value: production
